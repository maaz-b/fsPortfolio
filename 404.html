<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Maaz | Software Engineer</title>
  <script>
    // SPA fallback for GitHub Pages.
    // GitHub Pages serves this 404.html for any unknown path. We rewrite the URL
    // into a query-string form that index.html knows how to decode, then redirect
    // to index.html so React Router can take over without losing the path.
    //
    // Example:
    //   /fsPortfolio/projects/quranly  →  /fsPortfolio/?p=/projects/quranly
    //
    // Tweak this number if the project is hosted at a different depth (root vs subfolder).
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
